services:
  # Node.js API
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: aipcore-api-dev
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=aipcore_pass
      - DB_NAME=aipcore_game
      - VITE_ADMIN_WALLET=${VITE_ADMIN_WALLET}
      - VITE_RPC_URL=${VITE_RPC_URL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
    restart: always

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: aipcore-db-dev
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=aipcore_pass
      - POSTGRES_DB=aipcore_game
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - aipcore_dev_db_data:/var/lib/postgresql/data
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  # Dev App (Vite)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3001/api
        - VITE_PROJECT_ID=ad615b7c3d0dc4e3aee306104d15c745
        - VITE_BSC_MAINNET_RPC=https://bsc-dataseed.binance.org
        - VITE_ADMIN_WALLET=0x1f806c285e0A19a292b199E89AEA7B8c92d9B904
    container_name: aipcore-app-dev
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    restart: always

volumes:
  aipcore_dev_db_data:
