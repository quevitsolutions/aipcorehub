<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- Full-screen viewport with safe-area support for iPhone notch/home bar -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <!-- PWA / mobile web app meta -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#080c14" />
    <meta name="color-scheme" content="dark" />
    <title>AIPCore — Tap to Earn</title>
    <meta name="description" content="AIPCore Tap-to-Earn Node Activation Game on BSC" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="root">
      <!-- Loading Spinner for instant rendering before React bundles load -->
      <div style="
        position: fixed;
        inset: 0;
        background: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #ffffff;
        font-family: 'Outfit', sans-serif;
        gap: 16px;
        z-index: 9999;
      ">
        <div style="
          width: 36px;
          height: 36px;
          border-radius: 50%;
          border: 3px solid rgba(255,255,255,0.1);
          border-top-color: #00D2FF;
          animation: spin 1s linear infinite;
          box-shadow: 0 0 15px rgba(0,210,255,0.3);
        "></div>
        <div style="
          font-size: 13px;
          font-weight: 800;
          letter-spacing: 1.5px;
          color: rgba(255,255,255,0.7);
          text-transform: uppercase;
        ">
          Initializing Protocol...
        </div>
      </div>
      <style>
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
