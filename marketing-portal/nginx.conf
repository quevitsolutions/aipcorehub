# ════════════════════════════════════════════════
#  AIP CORE MARKETING PORTAL — Nginx Config
#  Serves static React SPA on port 80 / 443
#  Domain: promo.aipcore.online (or custom)
# ════════════════════════════════════════════════

# ── HTTP → HTTPS redirect ──────────────────────
server {
    listen 80;
    server_name promo.aipcore.online www.promo.aipcore.online;

    # Certbot ACME challenge passthrough
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check endpoint (no redirect)
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ───────────────────────────────
server {
    listen 443 ssl;
    server_name promo.aipcore.online www.promo.aipcore.online;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/promo.aipcore.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/promo.aipcore.online/privkey.pem;

    # SSL optimization
    ssl_session_cache   shared:MKTSSL:10m;
    ssl_session_timeout 1440m;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml application/json
        application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|eot|webp)$ {
        root       /usr/share/nginx/html;
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # SPA fallback — all routes serve index.html
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;

        # No-cache for HTML itself
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
