# ═══════════════════════════════════════════════════════════════════
#  AIP CORE — MARKETING PORTAL — docker-compose.yml
#
#  ⚡ STANDALONE — Fully independent from the main core app stack.
#     Does NOT share networks, volumes or containers with the core.
#     Run on a separate server or a separate port on the same host.
#
#  Quick start:
#    cp .env.example .env   # fill in your values
#    docker compose up -d
#
#  Ports used (configurable via .env):
#    HTTP  → 8080
# ═══════════════════════════════════════════════════════════════════

services:

  # ── Marketing Frontend (Static SPA) ─────────────────────────────
  marketing:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_APP_URL=${VITE_APP_URL:-https://aipcore.online}
        - VITE_API_URL=${VITE_API_URL:-https://aipcore.online/api}
    image: aipcore-marketing:latest
    container_name: aipcore-marketing
    ports:
      - "${MARKETING_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    labels:
      - "com.aipcore.service=marketing-portal"
      - "com.aipcore.version=1.0.0"

networks:
  default:
    name: aipcore-marketing-net
    driver: bridge
