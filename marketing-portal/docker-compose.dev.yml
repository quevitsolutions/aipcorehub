# ─────────────────────────────────────────────────
#  AIP CORE MARKETING PORTAL — DEV docker-compose
#  Hot-reload dev server on port 5174
# ─────────────────────────────────────────────────

services:
  marketing-dev:
    image: node:20-alpine
    container_name: aipcore-marketing-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5174:5174"
    environment:
      - VITE_APP_URL=${VITE_APP_URL:-https://aipcore.online}
      - VITE_API_URL=${VITE_API_URL:-https://aipcore.online/api}
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
